services:
  server-photos:
    build: .
    container_name: server-photos
    restart: unless-stopped
    ports:
      - "3002:3001"
    volumes:
      - /path/to/your/photos:/mnt/media/photos
      - ./data:/app/data
    environment:
      - UPLOADS_DIR=/mnt/media/photos
      - DB_PATH=/app/data/photos.db
      - PORT=3001
      - AUTH_PASSWORD=yourpasswordhere
      - JWT_SECRET=yoursecrethere
